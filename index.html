<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Reef Engine</title>

<style>
body {
    font-family: Arial;
    background: #0b1e2d;
    color: white;
    margin: 0;
    padding: 20px;
}
.container { max-width: 900px; margin: auto; }
.card {
    background: #132f45;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}
button {
    background: #00bcd4;
    border: none;
    padding: 10px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}
.result { font-size: 18px; margin-top: 10px; }
canvas {
    margin-top: 20px;
    background: #0b1e2d;
}
</style>

</head>

<body>

<div class="container">

<h1>GROAN™ Synthetic Reef Engine</h1>

<div class="card">
<h3>Scenario Preset</h3>
<select id="preset">
<option value="custom">Custom</option>
<option value="belize">Belize Reef</option>
<option value="bocas">Bocas del Toro</option>
</select>
</div>

<div class="card">
<h3>Environmental Inputs</h3>

<label>Temperature (°C)</label>
<input type="number" id="temp" value="28">

<label>Aragonite Saturation (Ωarag)</label>
<input type="number" id="arag" value="3.5" step="0.1">

<label>Nutrients (0–10)</label>
<input type="number" id="nutrients" value="3">

<label>Sediment (0–10)</label>
<input type="number" id="sediment" value="2">

<label>Light (0–10)</label>
<input type="number" id="light" value="8">

<label>Time Horizon (months)</label>
<input type="number" id="time" value="12">

</div>

<div class="card">
<button onclick="runSimulation()">Run GROAN</button>
<div class="result" id="output"></div>
<canvas id="chart" width="800" height="300"></canvas>
</div>

</div>

<script>

// PRESETS
document.getElementById("preset").addEventListener("change", function() {
    if (this.value === "belize") {
        setInputs(28, 3.6, 4, 3, 8);
    }
    if (this.value === "bocas") {
        setInputs(29, 3.2, 6, 5, 7);
    }
});

function setInputs(t, a, n, s, l) {
    temp.value = t;
    arag.value = a;
    nutrients.value = n;
    sediment.value = s;
    light.value = l;
}

// CORE ENGINE
function runSimulation() {

    let T = parseFloat(temp.value);
    let A = parseFloat(arag.value);
    let N = parseFloat(nutrients.value);
    let S = parseFloat(sediment.value);
    let L = parseFloat(light.value);
    let months = parseInt(time.value);

    // STRESS
    let stress =
        Math.max(0, T - 27) * 0.4 +
        (4 - A) * 0.6 +
        N * 0.3 +
        S * 0.4 -
        L * 0.2;

    // CALCIFICATION
    let calcification = Math.max(0, (A * 2) - stress);

    // TIME SIMULATION
    let health = 100;
    let trajectory = [];

    for (let i = 0; i < months; i++) {
        let decline = stress * 1.5;
        let recovery = calcification * 0.8;
        health += recovery - decline;

        if (health > 100) health = 100;
        if (health < 0) health = 0;

        trajectory.push(Math.round(health));
    }

    // DRIVER RANKING
    let drivers = [
        {name: "Temperature", value: Math.max(0, T - 27) * 0.4},
        {name: "Aragonite", value: (4 - A) * 0.6},
        {name: "Nutrients", value: N * 0.3},
        {name: "Sediment", value: S * 0.4},
        {name: "Light", value: -L * 0.2}
    ];

    drivers.sort((a,b)=>Math.abs(b.value)-Math.abs(a.value));

    // INTERVENTIONS
    let interventions = [];

    if (N > 5) interventions.push("Reduce nutrient runoff");
    if (S > 4) interventions.push("Control sediment flow");
    if (A < 3.2) interventions.push("Monitor acidification / buffering");
    if (T > 29) interventions.push("Heat stress mitigation");

    if (interventions.length === 0) {
        interventions.push("System stable — maintain conditions");
    }

    // OUTPUT
    output.innerHTML = `
    <b>Final Reef Health:</b> ${Math.round(health)} / 100<br><br>

    <b>Top Drivers:</b><br>
    ${drivers.slice(0,3).map(d => d.name).join(", ")}<br><br>

    <b>Recommended Actions:</b><br>
    ${interventions.join("<br>")}
    `;

    drawChart(trajectory);
}

// SIMPLE GRAPH
function drawChart(data) {

    let canvas = document.getElementById("chart");
    let ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let max = 100;
    let width = canvas.width;
    let height = canvas.height;

    ctx.beginPath();
    ctx.moveTo(0, height - (data[0]/max)*height);

    for (let i = 1; i < data.length; i++) {
        let x = (i / data.length) * width;
        let y = height - (data[i]/max)*height;
        ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "#00bcd4";
    ctx.lineWidth = 2;
    ctx.stroke();
}

</script>

</body>
</html>
