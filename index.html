<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Reef Engine</title>

<style>
body { font-family: Arial; background:#0b1e2d; color:white; padding:20px; }
.container { max-width:1200px; margin:auto; }
.row { display:flex; gap:20px; }
.card { background:#132f45; padding:15px; border-radius:8px; flex:1; }
input, select { width:100%; padding:6px; margin:4px 0; }
button { width:100%; padding:10px; background:#00bcd4; border:none; cursor:pointer; }
canvas { background:#0b1e2d; margin-top:10px; }
</style>

</head>
<body>

<div class="container">

<h1>GROAN™ Multi-Scenario Engine</h1>

<div class="row">

<div class="card">
<h3>Scenario A</h3>
Temp <input id="t1" value="28">
Ωarag <input id="a1" value="3.5">
Nutrients <input id="n1" value="3">
Sediment <input id="s1" value="2">
Light <input id="l1" value="8">
</div>

<div class="card">
<h3>Scenario B</h3>
Temp <input id="t2" value="29">
Ωarag <input id="a2" value="3.2">
Nutrients <input id="n2" value="6">
Sediment <input id="s2" value="5">
Light <input id="l2" value="7">
</div>

</div>

<div class="card">
Time (months) <input id="time" value="12">
<button onclick="run()">Compare Scenarios</button>

<div id="output"></div>
<canvas id="chart" width="1000" height="300"></canvas>
</div>

</div>

<script>

function simulate(T,A,N,S,L,months){

let stress =
Math.max(0,T-27)*0.4 +
(4-A)*0.6 +
N*0.3 +
S*0.4 -
L*0.2;

let calc = Math.max(0,(A*2)-stress);

let health=100;
let traj=[];

for(let i=0;i<months;i++){
health += (calc*0.8) - (stress*1.5);
if(health>100) health=100;
if(health<0) health=0;
traj.push(health);
}

return {traj,final:Math.round(health),stress};
}

function run(){

let months = parseInt(time.value);

let A = simulate(
parseFloat(t1.value),
parseFloat(a1.value),
parseFloat(n1.value),
parseFloat(s1.value),
parseFloat(l1.value),
months
);

let B = simulate(
parseFloat(t2.value),
parseFloat(a2.value),
parseFloat(n2.value),
parseFloat(s2.value),
parseFloat(l2.value),
months
);

output.innerHTML = `
<b>Scenario A:</b> ${A.final}<br>
<b>Scenario B:</b> ${B.final}<br><br>
<b>Better System:</b> ${A.final > B.final ? "Scenario A" : "Scenario B"}
`;

draw(A.traj,B.traj);
}

function draw(A,B){

let c = chart;
let ctx = c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let h=c.height,w=c.width;

ctx.beginPath();
for(let i=0;i<A.length;i++){
let x=i/A.length*w;
let y=h-(A[i]/100*h);
if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.strokeStyle="cyan";
ctx.stroke();

ctx.beginPath();
for(let i=0;i<B.length;i++){
let x=i/B.length*w;
let y=h-(B[i]/100*h);
if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.strokeStyle="orange";
ctx.stroke();

}

</script>

</body>
</html>
