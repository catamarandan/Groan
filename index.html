<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Base Engine</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e2d;
    color: white;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
}
.card {
    background: #132f45;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
}
button {
    background: #00bcd4;
    border: none;
    padding: 10px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}
.result {
    font-size: 18px;
    margin-top: 10px;
}
canvas {
    margin-top: 20px;
    background: #0b1e2d;
    border-radius: 6px;
}
a {
    color: #00bcd4;
    text-decoration: none;
    margin-right: 15px;
}
.nav {
    margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">

<div class="nav">
    <a href="index.html">Base Engine</a>
    <a href="compare.html">Compare</a>
    <a href="decision.html">Decision</a>
    <a href="optimize.html">Optimize</a>
</div>

<h1>GROAN™ Base Engine</h1>

<div class="card">
    <h3>Scenario Preset</h3>
    <select id="preset">
        <option value="custom">Custom</option>
        <option value="belize">Belize Reef</option>
        <option value="bocas">Bocas del Toro</option>
    </select>
</div>

<div class="card">
    <h3>Environmental Inputs</h3>

    <label>Temperature (°C)</label>
    <input type="number" id="temp" value="28" step="0.1">

    <label>Aragonite Saturation (Ωarag)</label>
    <input type="number" id="arag" value="3.5" step="0.1">

    <label>Nutrients (0–10)</label>
    <input type="number" id="nutrients" value="3" step="0.1">

    <label>Sediment (0–10)</label>
    <input type="number" id="sediment" value="2" step="0.1">

    <label>Light (0–10)</label>
    <input type="number" id="light" value="8" step="0.1">

    <label>Time Horizon (months)</label>
    <input type="number" id="time" value="12" step="1">
</div>

<div class="card">
    <button onclick="runSimulation()">Run GROAN</button>
    <div class="result" id="output"></div>
    <canvas id="chart" width="800" height="300"></canvas>
</div>

</div>

<script>
document.getElementById("preset").addEventListener("change", function() {
    if (this.value === "belize") setInputs(28, 3.6, 4, 3, 8);
    if (this.value === "bocas") setInputs(29, 3.2, 6, 5, 7);
});

function setInputs(t, a, n, s, l) {
    document.getElementById("temp").value = t;
    document.getElementById("arag").value = a;
    document.getElementById("nutrients").value = n;
    document.getElementById("sediment").value = s;
    document.getElementById("light").value = l;
}

function simulate(T, A, N, S, L, months) {
    const stress =
        Math.max(0, T - 27) * 0.4 +
        (4 - A) * 0.6 +
        N * 0.3 +
        S * 0.4 -
        L * 0.2;

    const calcification = Math.max(0, (A * 2) - stress);

    let health = 100;
    const trajectory = [];

    for (let i = 0; i < months; i++) {
        const decline = stress * 1.5;
        const recovery = calcification * 0.8;
        health += recovery - decline;

        if (health > 100) health = 100;
        if (health < 0) health = 0;

        trajectory.push(Math.round(health));
    }

    const drivers = [
        { name: "Temperature", value: Math.max(0, T - 27) * 0.4 },
        { name: "Aragonite", value: (4 - A) * 0.6 },
        { name: "Nutrients", value: N * 0.3 },
        { name: "Sediment", value: S * 0.4 },
        { name: "Light", value: -L * 0.2 }
    ].sort((a, b) => Math.abs(b.value) - Math.abs(a.value));

    const interventions = [];
    if (N > 5) interventions.push("Reduce nutrient runoff");
    if (S > 4) interventions.push("Control sediment flow");
    if (A < 3.2) interventions.push("Monitor acidification / buffering");
    if (T > 29) interventions.push("Heat stress mitigation");
    if (interventions.length === 0) interventions.push("System stable — maintain conditions");

    return {
        finalHealth: Math.round(health),
        trajectory,
        drivers: drivers.slice(0, 3).map(d => d.name),
        interventions
    };
}

function runSimulation() {
    const T = parseFloat(document.getElementById("temp").value);
    const A = parseFloat(document.getElementById("arag").value);
    const N = parseFloat(document.getElementById("nutrients").value);
    const S = parseFloat(document.getElementById("sediment").value);
    const L = parseFloat(document.getElementById("light").value);
    const months = parseInt(document.getElementById("time").value, 10);

    const result = simulate(T, A, N, S, L, months);

    document.getElementById("output").innerHTML = `
        <b>Final Reef Health:</b> ${result.finalHealth} / 100<br><br>
        <b>Top Drivers:</b><br>${result.drivers.join(", ")}<br><br>
        <b>Recommended Actions:</b><br>${result.interventions.join("<br>")}
    `;

    drawChart(result.trajectory);
}

function drawChart(data) {
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const max = 100;
    const width = canvas.width;
    const height = canvas.height;

    if (data.length === 0) return;

    ctx.beginPath();
    ctx.moveTo(0, height - (data[0] / max) * height);

    for (let i = 1; i < data.length; i++) {
        const x = (i / (data.length - 1 || 1)) * width;
        const y = height - (data[i] / max) * height;
        ctx.lineTo(x, y);
    }

    ctx.strokeStyle = "#00bcd4";
    ctx.lineWidth = 2;
    ctx.stroke();
}
</script>

</body>
</html>
