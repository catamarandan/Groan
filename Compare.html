<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Comparison Engine</title>

<style>
body { font-family: Arial; background:#0b1e2d; color:white; padding:20px; }
.container { max-width:1200px; margin:auto; }
.row { display:flex; gap:20px; }
.card { background:#132f45; padding:15px; border-radius:8px; flex:1; }
input { width:100%; padding:6px; margin:4px 0; }
button { width:100%; padding:10px; background:#00bcd4; border:none; cursor:pointer; }
canvas { background:#0b1e2d; margin-top:10px; }
a { color:#00bcd4; }
</style>

</head>
<body>

<div class="container">

<h1>GROAN™ Multi-Scenario Comparison</h1>

<p><a href="index.html">← Back to Base Engine</a></p>

<div class="row">

<div class="card">
<h3>Scenario A</h3>
Temperature <input id="t1" value="28">
Ωarag <input id="a1" value="3.5">
Nutrients <input id="n1" value="3">
Sediment <input id="s1" value="2">
Light <input id="l1" value="8">
</div>

<div class="card">
<h3>Scenario B</h3>
Temperature <input id="t2" value="29">
Ωarag <input id="a2" value="3.2">
Nutrients <input id="n2" value="6">
Sediment <input id="s2" value="5">
Light <input id="l2" value="7">
</div>

</div>

<div class="card">
Time Horizon (months) <input id="time" value="12">
<button onclick="run()">Compare Scenarios</button>

<div id="output"></div>
<canvas id="chart" width="1000" height="300"></canvas>
</div>

</div>

<script>

function simulate(T,A,N,S,L,months){

T = parseFloat(T);
A = parseFloat(A);
N = parseFloat(N);
S = parseFloat(S);
L = parseFloat(L);

let stress =
Math.max(0,T-27)*0.4 +
(4-A)*0.6 +
N*0.3 +
S*0.4 -
L*0.2;

let calc = Math.max(0,(A*2)-stress);

let health=100;
let traj=[];

for(let i=0;i<months;i++){
health += (calc*0.8) - (stress*1.5);
if(health>100) health=100;
if(health<0) health=0;
traj.push(health);
}

return {traj,final:Math.round(health),stress,T,A,N,S,L};
}

function run(){

let months = parseInt(document.getElementById("time").value);

let A = simulate(
t1.value,a1.value,n1.value,s1.value,l1.value,months
);

let B = simulate(
t2.value,a2.value,n2.value,s2.value,l2.value,months
);

let better = A.final > B.final ? "Scenario A" : "Scenario B";

output.innerHTML = `
<b>Scenario A Final Health:</b> ${A.final}<br>
<b>Scenario B Final Health:</b> ${B.final}<br><br>

<b>Better System:</b> ${better}
`;

draw(A.traj,B.traj);
}

function draw(A,B){

let c = document.getElementById("chart");
let ctx = c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let h=c.height,w=c.width;

// Scenario A
ctx.beginPath();
for(let i=0;i<A.length;i++){
let x=i/A.length*w;
let y=h-(A[i]/100*h);
if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.strokeStyle="cyan";
ctx.lineWidth=2;
ctx.stroke();

// Scenario B
ctx.beginPath();
for(let i=0;i<B.length;i++){
let x=i/B.length*w;
let y=h-(B[i]/100*h);
if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.strokeStyle="orange";
ctx.lineWidth=2;
ctx.stroke();

}

</script>

</body>
</html>
