<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Decision Engine</title>

<style>
body { font-family: Arial; background:#0b1e2d; color:white; padding:20px; }
.container { max-width:1000px; margin:auto; }
.card { background:#132f45; padding:15px; border-radius:8px; margin:10px 0; }
input { width:100%; padding:6px; margin:4px 0; }
button { width:100%; padding:10px; background:#00bcd4; border:none; cursor:pointer; }
canvas { margin-top:10px; }
</style>

</head>
<body>

<div class="container">

<h1>GROAN™ Intervention Engine</h1>

<div class="card">
Temperature <input id="T" value="29">
Ωarag <input id="A" value="3.2">
Nutrients <input id="N" value="6">
Sediment <input id="S" value="5">
Light <input id="L" value="7">
</div>

<div class="card">
<h3>Interventions</h3>
<label><input type="checkbox" id="fixN"> Reduce Nutrients</label><br>
<label><input type="checkbox" id="fixS"> Reduce Sediment</label><br>
<label><input type="checkbox" id="fixT"> Reduce Temperature</label><br>
<label><input type="checkbox" id="boostA"> Increase Ωarag</label>
</div>

<div class="card">
Time (months) <input id="time" value="12">
<button onclick="run()">Simulate Intervention</button>

<div id="output"></div>
<canvas id="chart" width="900" height="300"></canvas>
</div>

</div>

<script>

function simulate(T,A,N,S,L,months){

let stress =
Math.max(0,T-27)*0.4 +
(4-A)*0.6 +
N*0.3 +
S*0.4 -
L*0.2;

let calc = Math.max(0,(A*2)-stress);

let health=100;
let traj=[];

for(let i=0;i<months;i++){
health += (calc*0.8) - (stress*1.5);
if(health>100) health=100;
if(health<0) health=0;
traj.push(health);
}

return {traj,final:Math.round(health)};
}

function run(){

let T = parseFloat(document.getElementById("T").value);
let A = parseFloat(document.getElementById("A").value);
let N = parseFloat(document.getElementById("N").value);
let S = parseFloat(document.getElementById("S").value);
let L = parseFloat(document.getElementById("L").value);
let months = parseInt(document.getElementById("time").value);

// baseline
let base = simulate(T,A,N,S,L,months);

// apply interventions
let T2=T, A2=A, N2=N, S2=S;

if(fixN.checked) N2 -= 2;
if(fixS.checked) S2 -= 2;
if(fixT.checked) T2 -= 1;
if(boostA.checked) A2 += 0.5;

let improved = simulate(T2,A2,N2,S2,L,months);

let gain = improved.final - base.final;

output.innerHTML = `
<b>Baseline Health:</b> ${base.final}<br>
<b>Improved Health:</b> ${improved.final}<br><br>

<b>Impact:</b> ${gain > 0 ? "+" : ""}${gain}
`;

draw(base.traj, improved.traj);
}

function draw(A,B){

let c = document.getElementById("chart");
let ctx = c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let h=c.height,w=c.width;

// baseline
ctx.beginPath();
for(let i=0;i<A.length;i++){
let x=i/A.length*w;
let y=h-(A[i]/100*h);
if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.strokeStyle="orange";
ctx.stroke();

// improved
ctx.beginPath();
for(let i=0;i<B.length;i++){
let x=i/B.length*w;
let y=h-(B[i]/100*h);
if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
}
ctx.strokeStyle="lime";
ctx.stroke();

}

</script>

</body>
</html>
