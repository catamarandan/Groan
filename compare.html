<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Comparison Engine</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e2d;
    color: white;
    margin: 0;
    padding: 20px;
}
.container {
    max-width: 1200px;
    margin: auto;
}
.row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}
.card {
    background: #132f45;
    padding: 15px;
    border-radius: 8px;
    flex: 1;
    min-width: 320px;
    margin-bottom: 15px;
}
input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 10px;
    background: #00bcd4;
    border: none;
    cursor: pointer;
    font-size: 16px;
}
canvas {
    background: #0b1e2d;
    margin-top: 15px;
    border-radius: 6px;
}
a {
    color: #00bcd4;
    text-decoration: none;
    margin-right: 15px;
}
.nav {
    margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">

<div class="nav">
    <a href="index.html">Base Engine</a>
    <a href="compare.html">Compare</a>
    <a href="decision.html">Decision</a>
    <a href="optimize.html">Optimize</a>
</div>

<h1>GROAN™ Multi-Scenario Comparison</h1>

<div class="row">
    <div class="card">
        <h3>Scenario A</h3>
        <label>Temperature</label>
        <input id="t1" value="28">
        <label>Ωarag</label>
        <input id="a1" value="3.5">
        <label>Nutrients</label>
        <input id="n1" value="3">
        <label>Sediment</label>
        <input id="s1" value="2">
        <label>Light</label>
        <input id="l1" value="8">
    </div>

    <div class="card">
        <h3>Scenario B</h3>
        <label>Temperature</label>
        <input id="t2" value="29">
        <label>Ωarag</label>
        <input id="a2" value="3.2">
        <label>Nutrients</label>
        <input id="n2" value="6">
        <label>Sediment</label>
        <input id="s2" value="5">
        <label>Light</label>
        <input id="l2" value="7">
    </div>
</div>

<div class="card">
    <label>Time Horizon (months)</label>
    <input id="time" value="12">
    <button onclick="run()">Compare Scenarios</button>
    <div id="output" style="margin-top:15px;"></div>
    <canvas id="chart" width="1000" height="300"></canvas>
</div>

</div>

<script>
function simulate(T, A, N, S, L, months) {
    T = parseFloat(T);
    A = parseFloat(A);
    N = parseFloat(N);
    S = parseFloat(S);
    L = parseFloat(L);

    const stress =
        Math.max(0, T - 27) * 0.4 +
        (4 - A) * 0.6 +
        N * 0.3 +
        S * 0.4 -
        L * 0.2;

    const calc = Math.max(0, (A * 2) - stress);

    let health = 100;
    const traj = [];

    for (let i = 0; i < months; i++) {
        health += (calc * 0.8) - (stress * 1.5);
        if (health > 100) health = 100;
        if (health < 0) health = 0;
        traj.push(Math.round(health));
    }

    return { traj, final: Math.round(health), stress };
}

function run() {
    const months = parseInt(document.getElementById("time").value, 10);

    const A = simulate(
        document.getElementById("t1").value,
        document.getElementById("a1").value,
        document.getElementById("n1").value,
        document.getElementById("s1").value,
        document.getElementById("l1").value,
        months
    );

    const B = simulate(
        document.getElementById("t2").value,
        document.getElementById("a2").value,
        document.getElementById("n2").value,
        document.getElementById("s2").value,
        document.getElementById("l2").value,
        months
    );

    const better =
        A.final > B.final ? "Scenario A" :
        B.final > A.final ? "Scenario B" :
        "Tie";

    document.getElementById("output").innerHTML = `
        <b>Scenario A Final Health:</b> ${A.final}<br>
        <b>Scenario B Final Health:</b> ${B.final}<br><br>
        <b>Better System:</b> ${better}
    `;

    draw(A.traj, B.traj);
}

function draw(A, B) {
    const c = document.getElementById("chart");
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);

    const h = c.height;
    const w = c.width;

    ctx.beginPath();
    for (let i = 0; i < A.length; i++) {
        const x = (i / (A.length - 1 || 1)) * w;
        const y = h - (A[i] / 100 * h);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = "cyan";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    for (let i = 0; i < B.length; i++) {
        const x = (i / (B.length - 1 || 1)) * w;
        const y = h - (B[i] / 100 * h);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = "orange";
    ctx.lineWidth = 2;
    ctx.stroke();
}
</script>

</body>
</html>
