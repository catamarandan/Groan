<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GROAN™ Optimization Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --border: #d7deea;
      --text: #16324f;
      --muted: #5f7288;
      --accent: #1f6fb2;
      --accent-dark: #155588;
      --good: #1d7a46;
      --watch: #9a6700;
      --warn: #b54708;
      --bad: #b42318;
      --shadow: 0 10px 30px rgba(20, 42, 74, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4fa 0%, #f8fbfe 100%);
      color: var(--text);
      padding: 24px;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
    }
    .hero {
      background: linear-gradient(135deg, #173b63 0%, #245c92 100%);
      color: #fff;
      border-radius: 18px;
      padding: 24px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 2rem;
      letter-spacing: 0.2px;
    }
    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.88);
      font-size: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .panel h2 {
      margin: 0 0 16px 0;
      font-size: 1.3rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: var(--text);
    }
    .field input,
    .field select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #c9d4e3;
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
    }
    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 111, 178, 0.12);
    }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-dark);
    }
    .btn-secondary {
      background: #eaf1f8;
      color: var(--text);
      border: 1px solid #d5e1ee;
    }
    .btn-danger {
      background: #f7ecec;
      color: #7c1c1c;
      border: 1px solid #ead0d0;
    }
    .statusbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .mini {
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .mini .k {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .mini .v {
      font-size: 1.05rem;
      font-weight: 700;
    }
    .output-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .box {
      background: #fbfdff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .box h3 {
      margin: 0 0 10px 0;
      font-size: 1.05rem;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.93rem;
      color: #17324f;
    }
    .trajectory-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 8px;
    }
