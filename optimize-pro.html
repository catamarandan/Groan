<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Optimization Pro</title>
<style>
body { font-family: Arial; padding: 20px; }
input { margin: 5px; }
button { margin: 10px 0; }
#sourceTag { font-weight: bold; margin-top: 10px; }
</style>
</head>

<body>

<h2>GROAN™ Optimization Pro</h2>

<h3>Inputs</h3>

<label>Temperature (°C)</label><br>
<input id="temp" type="number" value="28"><br>

<label>Ωarag</label><br>
<input id="omega" type="number" value="3.5"><br>

<label>Nutrients</label><br>
<input id="nutrients" type="number" value="3"><br>

<label>Sediment</label><br>
<input id="sediment" type="number" value="2"><br>

<label>Light</label><br>
<input id="light" type="number" value="8"><br>

<label>Time (months)</label><br>
<input id="time" type="number" value="12"><br>

<button onclick="runGROAN()">Run GROAN</button>

<div id="sourceTag"></div>

<h3>Output</h3>
<pre id="output"></pre>

<script type="module">

// ---------------- NOAA INGEST ----------------

const NOAA_BASE_URL = "https://coastwatch.pfeg.noaa.gov/erddap/griddap/";
const DATASET = "jplMURSST41";

async function fetchNOAAData(lat, lon) {
    try {
        const now = new Date();
        const dateStr = now.toISOString().split("T")[0];

        const query = `${NOAA_BASE_URL}${DATASET}.json?analysed_sst[(${dateStr}T00:00:00Z)][(${lat})][(${lon})]`;

        const response = await fetch(query);
        if (!response.ok) throw new Error("NOAA fetch failed");

        const data = await response.json();
        const sstKelvin = data.table.rows[0][0];
        const tempC = sstKelvin - 273.15;

        return {
            temperature_c: round(tempC, 2),
            source: "NOAA",
            timestamp: now.toISOString()
        };

    } catch (err) {
        console.error("NOAA ERROR:", err);
        return null;
    }
}

// ---------------- CORE ENGINE ----------------

async function runGROAN() {

    const lat = 9.35;
    const lon = -82.25;

    const rawNOAA = await fetchNOAAData(lat, lon);

    let tempInput;
    let sourceLabel;

    if (rawNOAA) {
        tempInput = rawNOAA.temperature_c;
        document.getElementById("temp").value = tempInput;
        sourceLabel = "NOAA LIVE DATA";
    } else {
        tempInput = parseFloat(document.getElementById("temp").value);
        sourceLabel = "MANUAL INPUT";
    }

    document.getElementById("sourceTag").innerText = "Data Source: " + sourceLabel;

    const T = convertTemperatureToStress(tempInput);
    const O = parseFloat(document.getElementById("omega").value);
    const N = parseFloat(document.getElementById("nutrients").value);
    const S = parseFloat(document.getElementById("sediment").value);
    const L = parseFloat(document.getElementById("light").value);
    const time = parseInt(document.getElementById("time").value);

    let health = 100;
    let trajectory = [];

    for (let i = 0; i < time; i++) {
        let stress = (T + N + S) / 3;
        let recovery = (O + L) / 2;

        health += (recovery - stress);
        health = clamp(health, 0, 100);
        trajectory.push(round(health, 2));
    }

    const trend = detectTrend(trajectory);
    const momentum = detectMomentum(trajectory);
    const status = classifyStatus(health, trend);

    document.getElementById("output").innerText =
        JSON.stringify({
            final_health: health,
            status,
            trend,
            momentum,
            trajectory,
            data_source: sourceLabel
        }, null, 2);
}

// ---------------- HELPERS ----------------

function convertTemperatureToStress(tempC) {
    if (tempC < 26) return 2;
    if (tempC < 28) return 4;
    if (tempC < 30) return 6;
    if (tempC < 31) return 8;
    return 10;
}

function detectTrend(arr) {
    if (arr[arr.length - 1] > arr[0]) return "Improving";
    if (arr[arr.length - 1] < arr[0]) return "Degrading";
    return "Stable";
}

function detectMomentum(arr) {
    let delta = arr[arr.length - 1] - arr[arr.length - 2];
    if (Math.abs(delta) < 0.5) return "Weak";
    if (Math.abs(delta) < 1.5) return "Moderate";
    return "Strong";
}

function classifyStatus(health, trend) {
    if (health > 70 && trend === "Improving") return "Stable";
    if (health > 50) return "Watch";
    if (health > 30) return "Warning";
    return "Critical";
}

function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

function round(val, dec) {
    return Number(Math.round(val + "e" + dec) + "e-" + dec);
}

</script>

</body>
</html>
