<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Optimization Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#0b1e2d; color:white; padding:20px; margin:0; }
.container { max-width:900px; margin:auto; }
.card { background:#132f45; padding:15px; border-radius:8px; margin:10px 0; }
input { width:100%; padding:8px; margin:4px 0 10px 0; box-sizing:border-box; }
button { width:100%; padding:12px; background:#00bcd4; border:none; cursor:pointer; font-weight:bold; border-radius:6px; }
.status { padding:14px; border-radius:8px; font-size:22px; font-weight:bold; margin:10px 0; }
</style>

</head>
<body>

<div class="container">

<h1>GROAN™ Optimization Pro</h1>

<div class="card">
Temperature <input id="T" value="29">
Ωarag <input id="A" value="3.2">
Nutrients <input id="N" value="6">
Sediment <input id="S" value="5">
Light <input id="L" value="7">
</div>

<div class="card">
Time (months) <input id="time" value="12">
<button id="runBtn">Find Best Strategy</button>
<div id="output"></div>
</div>

</div>

<script>

// ================= ENGINE (FIXED) =================
function monthlyDynamics(T,A,N,S,L){

    let t = (T - 27) / 3;
    let a = (4 - A) / 1.5;
    let n = N / 10;
    let s = S / 10;
    let l = (8 - L) / 8;

    let stress =
        (t * 0.45) +
        (a * 0.30) +
        (n * 0.25) +
        (s * 0.30) +
        (l * 0.20);

    let recovery =
        (A / 4 * 0.5) +
        (L / 10 * 0.25);

    let net = (recovery * 0.55) - (stress * 1.35);

    return { stress, recovery, net };
}

function simulateSeries(T,A,N,S,L,months){
    let health = 100;
    let series = [];

    for(let i=0;i<months;i++){
        const d = monthlyDynamics(T,A,N,S,L);
        health += d.net;

        if(health > 100) health = 100;
        if(health < 0) health = 0;

        series.push(health);
    }

    return series;
}

// ================= TREND =================
function detectTrend(series){
    if(!series || series.length < 3) return "Stable";

    let r = series.slice(-3);
    let slope = (r[2] - r[0]) / 2;

    if(slope > 0.5) return "Improving";
    if(slope < -0.5) return "Degrading";
    return "Stable";
}

function detectMomentum(series){
    if (!series || series.length < 6) return "Weak";

    let recent = series.slice(-6);
    let delta = recent[recent.length - 1] - recent[0];

    if(Math.abs(delta) < 2) return "Weak";
    if(Math.abs(delta) < 6) return "Moderate";
    return "Strong";
}

// ================= RISK =================
function classifyStatus(score){
    if(score > 80) return "STABLE";
    if(score > 60) return "WATCH";
    if(score > 40) return "WARNING";
    return "CRITICAL";
}

function statusColor(status){
    if(status === "STABLE") return "green";
    if(status === "WATCH") return "yellow";
    if(status === "WARNING") return "orange";
    return "red";
}

function statusMessage(status){
    if(status === "STABLE") return "Reef conditions stable.";
    if(status === "WATCH") return "Stress emerging.";
    if(status === "WARNING") return "Health declining.";
    return "Rapid degradation.";
}

function findThresholdCross(series, threshold){
    for(let i=0;i<series.length;i++){
        if(series[i] <= threshold) return i + 1;
    }
    return null;
}

function projectFutureRisk(T,A,N,S,L,currentScore,maxMonths){
    let h = currentScore;

    for(let m=1;m<=maxMonths;m++){
        const d = monthlyDynamics(T,A,N,S,L);
        h += d.net;

        if(h > 100) h = 100;
        if(h < 0) h = 0;

        if(h <= 40) return "Critical risk within " + m + " months";
        if(h <= 60) return "Warning risk within " + m + " months";
    }

    return "No threshold breach projected in next " + maxMonths + " months";
}

function buildRiskText(series, T,A,N,S,L){
    const criticalNow = findThresholdCross(series, 40);
    if(criticalNow !== null) return "Critical threshold reached in " + criticalNow + " months";

    const warningNow = findThresholdCross(series, 60);
    if(warningNow !== null) return "Warning threshold reached in " + warningNow + " months";

    const current = series[series.length - 1];
    return projectFutureRisk(T,A,N,S,L,current,12);
}

// ================= DRIVER =================
function rankDrivers(T,A,N,S,L){
    const impacts = {
        Temperature: Math.max(0, T - 27) * 0.4,
        Aragonite: Math.max(0, 4 - A) * 0.6,
        Nutrients: Math.max(0, N) * 0.3,
        Sediment: Math.max(0, S) * 0.4,
        Light: Math.max(0, 8 - L) * 0.15
    };

    return Object.entries(impacts)
        .sort((a,b) => b[1] - a[1])
        .slice(0,3)
        .map(x => x[0]);
}

// ================= LEGACY FLAGS =================
function getDriverFlags(T,A,N,S,L){
    let drivers = [];
    if(N > 5) drivers.push("nutrients");
    if(S > 4) drivers.push("sediment");
    if(T > 29) drivers.push("temperature");
    if(A < 3.2) drivers.push("low aragonite");
    if(L < 6) drivers.push("low light");
    return drivers;
}

function buildRecommendations(drivers){
    let rec = "";
    if(drivers.includes("nutrients")) rec += "Reduce nutrient runoff. ";
    if(drivers.includes("sediment")) rec += "Improve water clarity. ";
    if(drivers.includes("temperature")) rec += "Monitor thermal stress. ";
    if(drivers.includes("low aragonite")) rec += "Address acidification. ";
    if(drivers.includes("low light")) rec += "Reduce turbidity. ";
    if(rec === "") rec = "Maintain current conditions.";
    return rec;
}

// ================= OPTIMIZATION =================
let actions = [
    { n:"Reduce Nutrients", f:(x)=>({...x, N:Math.max(0, x.N - 2)}) },
    { n:"Reduce Sediment",  f:(x)=>({...x, S:Math.max(0, x.S - 2)}) },
    { n:"Reduce Temp",      f:(x)=>({...x, T:Math.max(24, x.T - 1)}) },
    { n:"Increase Ωarag",   f:(x)=>({...x, A:Math.min(4.2, x.A + 0.5)}) }
];

function evaluateStrategy(base, selectedActions, months){
    let state = { ...base };
    let names = [];

    for(const action of selectedActions){
        state = action.f(state);
        names.push(action.n);
    }

    let series = simulateSeries(state.T, state.A, state.N, state.S, state.L, months);
    let rawFinal = series[series.length - 1];

    let bonus = 0;
    if(names.includes("Reduce Nutrients") && names.includes("Reduce Sediment")) bonus += 3;

    let penalty = 0;
    if(selectedActions.length >= 2) penalty += (selectedActions.length - 1) * 5;

    let variability = (Math.random() * 3) - 1.5;

    let adjusted = Math.round(rawFinal + bonus - penalty + variability);

    if(adjusted > 95) adjusted = 95;
    if(adjusted < 0) adjusted = 0;

    return {
        combo: names.join(" + "),
        value: adjusted
    };
}

function runOptimization(T,A,N,S,L,months){
    const base = { T, A, N, S, L };
    let results = [];

    for(let i=1;i<(1<<actions.length);i++){
        let selected = [];
        for(let j=0;j<actions.length;j++){
            if(i & (1<<j)) selected.push(actions[j]);
        }
        results.push(evaluateStrategy(base, selected, months));
    }

    results.sort((a,b)=>b.value-a.value);
    return results;
}

// ================= DECISION =================
function buildDecision(status, trend, momentum, riskText){
    if(status === "CRITICAL") return "IMMEDIATE ACTION REQUIRED";
    if(status === "WARNING" && trend === "Degrading") return "URGENT INTERVENTION REQUIRED";
    if(status === "WATCH" && trend === "Degrading") return "PREEMPTIVE ACTION ADVISED";
    if(riskText.includes("within")) return "FORWARD RISK DETECTED";
    return "MONITOR CONDITIONS";
}

// ================= MAIN =================
function run(){

    let T = parseFloat(T_input.value);
    let A = parseFloat(A_input.value);
    let N = parseFloat(N_input.value);
    let S = parseFloat(S_input.value);
    let L = parseFloat(L_input.value);
    let months = parseInt(time.value);

    let series = simulateSeries(T,A,N,S,L,months);
    let score = Math.round(series[series.length - 1]);

    let status = classifyStatus(score);
    let trend = detectTrend(series);
    let momentum = detectMomentum(series);
    let risk = buildRiskText(series, T,A,N,S,L);

    let rankedDrivers = rankDrivers(T,A,N,S,L);
    let drivers = getDriverFlags(T,A,N,S,L);
    let rec = buildRecommendations(drivers);

    let results = runOptimization(T,A,N,S,L,months);
    let decision = buildDecision(status, trend, momentum, risk);

    output.innerHTML = `
<div class="status" style="background:${statusColor(status)};color:black">${status}</div>
Baseline Score: ${score}
<br><br><b>Trend:</b> ${trend}
<br><b>Momentum:</b> ${momentum}
<br><b>Forward Risk:</b> ${risk}
<br><br>${statusMessage(status)}
<br><br><b>Top Drivers:</b> ${rankedDrivers.join(", ")}
<br><br><b>Recommendation:</b> ${rec}
<br><br><b>Decision:</b> ${decision}
<br><br><b>Best Strategy:</b><br>${results[0].combo} → ${results[0].value}
<br><br><b>Top 5:</b><br>${results.slice(0,5).map(r=>r.combo+": "+r.value).join("<br>")}
`;
}

document.getElementById("runBtn").addEventListener("click", run);

</script>

</body>
</html>
