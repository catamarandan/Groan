<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Optimization Pro</title>

<style>
body { font-family: Arial; background:#0b1e2d; color:white; padding:20px; }
.container { max-width:900px; margin:auto; }
.card { background:#132f45; padding:15px; border-radius:8px; margin:10px 0; }
input { width:100%; padding:6px; margin:4px 0; }
button { width:100%; padding:10px; background:#00bcd4; border:none; cursor:pointer; }
.status { font-size:18px; font-weight:bold; margin-top:10px; }
</style>

</head>
<body>

<div class="container">

<h1>GROAN™ Optimization Pro</h1>

<div class="card">
Temperature <input id="T" value="29">
Ωarag <input id="A" value="3.2">
Nutrients <input id="N" value="6">
Sediment <input id="S" value="5">
Light <input id="L" value="7">
</div>

<div class="card">
Time (months) <input id="time" value="12">
<button onclick="run()">Find Best Strategy</button>
<div id="output"></div>
</div>

</div>

<script>

function simulate(T,A,N,S,L,months){

let Tn = (T - 27)/3;
let An = (A - 3)/2;
let Nn = N/10;
let Sn = S/10;
let Ln = L/10;

let lambda = 0.2;

let Teff = Tn + lambda*(Nn + Sn - Ln);
let Aeff = An + lambda*(-Tn + Ln);
let Neff = Nn + lambda*(Tn + Sn);
let Seff = Sn + lambda*(Nn);
let Leff = Ln + lambda*(-Sn);

function clamp(x){ return Math.max(-1.5, Math.min(1.5, x)); }

Teff = clamp(Teff);
Aeff = clamp(Aeff);
Neff = clamp(Neff);
Seff = clamp(Seff);
Leff = clamp(Leff);

let stress =
Math.max(0,Teff)*0.6 +
(1 - Aeff)*0.8 +
Neff*0.5 +
Seff*0.6 -
Leff*0.3;

let calc = Math.max(0,(Aeff*2 + Leff) - stress);

let health=100;

for(let i=0;i<months;i++){
health += (calc*0.9) - (stress*1.4);
if(health>100) health=100;
if(health<0) health=0;
}

return {health, stress, Teff, Aeff, Neff, Seff, Leff};
}

function generateMessage(data){

let h = data.health;
let drivers = [];

if(data.Neff > 0.4) drivers.push("nutrients");
if(data.Seff > 0.4) drivers.push("sediment");
if(data.Teff > 0.4) drivers.push("temperature");
if(data.Aeff < 0.3) drivers.push("low aragonite");
if(data.Leff < 0.3) drivers.push("low light");

let status, msg, color;

if(h > 80){
status = "STABLE";
color = "#00e676"; // green
msg = "Reef conditions are stable. Growth is keeping pace with environmental stress.";
}
else if(h > 60){
status = "WATCH";
color = "#ffeb3b"; // yellow
msg = "Early signs of stress are emerging.";
}
else if(h > 40){
status = "WARNING";
color = "#ff9800"; // orange
msg = "Reef health is declining. Intervention recommended.";
}
else{
status = "CRITICAL";
color = "#ff1744"; // red
msg = "Rapid degradation detected. Immediate action required.";
}

let driverText = drivers.length ? " Primary drivers: " + drivers.join(", ") + "." : "";

let rec = "";

if(drivers.includes("nutrients")) rec += " Reduce nutrient runoff.";
if(drivers.includes("sediment")) rec += " Improve water clarity.";
if(drivers.includes("temperature")) rec += " Monitor thermal stress.";
if(drivers.includes("low aragonite")) rec += " Address acidification risks.";
if(drivers.includes("low light")) rec += " Reduce turbidity.";

return `
<div style="font-size:20px;font-weight:bold;color:${color};">
${status}
</div>
<br>${msg}${driverText}
<br><br><b>Recommendation:</b> ${rec || "Maintain current conditions."}
`;
}

function run(){

let T0 = parseFloat(T.value);
let A0 = parseFloat(A.value);
let N0 = parseFloat(N.value);
let S0 = parseFloat(S.value);
let L0 = parseFloat(L.value);
let months = parseInt(time.value);

let baseData = simulate(T0,A0,N0,S0,L0,months);
let base = Math.round(baseData.health);

let actions = [
{n:"Reduce Nutrients", f:(x)=>({...x,N:x.N-2})},
{n:"Reduce Sediment", f:(x)=>({...x,S:x.S-2})},
{n:"Reduce Temp", f:(x)=>({...x,T:x.T-1})},
{n:"Increase Ωarag", f:(x)=>({...x,A:x.A+0.5})}
];

let results = [];

for(let i=1;i<(1<<actions.length);i++){

let state={T:T0,A:A0,N:N0,S:S0};
let names=[];

for(let j=0;j<actions.length;j++){
if(i&(1<<j)){
state=actions[j].f(state);
names.push(actions[j].n);
}
}

let sim = simulate(state.T,state.A,state.N,state.S,L0,months);

results.push({combo:names.join(" + "),value:Math.round(sim.health)});
}

results.sort((a,b)=>b.value-a.value);

let messageBlock = generateMessage(baseData);

output.innerHTML=`
<b>Baseline Score:</b> ${base}<br><br>
${messageBlock}
<br><br>
<b>Best Strategy:</b><br>
${results[0].combo} → ${results[0].value}<br><br>
<b>Top 5 Strategies:</b><br>
${results.slice(0,5).map(r=>r.combo+": "+r.value).join("<br>")}
`;

}

</script>

</body>
</html>
