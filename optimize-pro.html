<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GROAN™ Optimization Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f4f7fb; --panel: #ffffff; --border: #d7deea; --text: #16324f;
      --muted: #5f7288; --accent: #1f6fb2; --accent-dark: #155588;
      --good: #1d7a46; --watch: #9a6700; --warn: #b54708; --bad: #b42318;
      --shadow: 0 10px 30px rgba(20, 42, 74, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #eef4fa 0%, #f8fbfe 100%);
      color: var(--text); padding: 24px;
    }
    .wrap { max-width: 1240px; margin: 0 auto; }
    .hero {
      background: linear-gradient(135deg, #173b63 0%, #245c92 100%);
      color: #fff; border-radius: 18px; padding: 24px 28px;
      box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .field label { display: block; margin-bottom: 6px; font-weight: 700; }
    .field input, .field select { width: 100%; padding: 10px; border: 1px solid #c9d4e3; border-radius: 10px; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    button { border: 0; border-radius: 10px; padding: 11px 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.9; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #eaf1f8; color: var(--text); border: 1px solid #d5e1ee; }
    .btn-danger { background: #f7ecec; color: #7c1c1c; border: 1px solid #ead0d0; }
    .statusbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .mini { background: #f8fbff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
    .mini .k { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
    .mini .v { font-size: 1rem; font-weight: 700; }
    .box { background: #fbfdff; border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 0.85rem; background: #f1f4f8; padding: 10px; border-radius: 8px; margin: 0; }
    .trajectory-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .month-chip { background: #eef5fc; border: 1px solid #d8e4f0; border-radius: 8px; padding: 8px; text-align: center; min-width: 85px; }
    .month-chip b { display: block; font-size: 0.7rem; color: var(--muted); }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .statusbar { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>GROAN™ Optimization Pro</h1>
      <p>Dynamic reef health trajectory and decision support.</p>
    </section>

    <div class="grid">
      <section class="panel">
        <h2>Inputs</h2>
        <div class="form-grid">
          <div class="field">
            <label>Preset</label>
            <select id="preset" onchange="applyPreset()">
              <option value="custom">Custom</option>
              <option value="healthy">Healthy</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="field"><label>Temp (°C)</label><input id="temp" type="number" step="0.1" value="28"></div>
          <div class="field"><label>Aragonite (Ω)</label><input id="omega" type="number" step="0.1" value="3.5"></div>
          <div class="field"><label>Nutrients (0-10)</label><input id="nutrients" type="number" step="0.1" value="3"></div>
          <div class="field"><label>Sediment (0-10)</label><input id="sediment" type="number" step="0.1" value="2"></div>
          <div class="field"><label>Light (0-10)</label><input id="light" type="number" step="0.1" value="8"></div>
          <div class="field"><label>Horizon (Months)</label><input id="time" type="number" value="12" max="60"></div>
        </div>
        <div class="btn-row">
          <button class="btn-primary" onclick="runEngine('Manual')">Run Manual</button>
          <button class="btn-secondary" onclick="fetchNOAA()">Run NOAA</button>
          <button class="btn-danger" onclick="resetForm()">Reset</button>
        </div>
      </section>

      <section class="panel">
        <div class="statusbar">
          <div class="mini"><div class="k">Source</div><div id="sourceTag" class="v">Manual</div></div>
          <div class="mini"><div class="k">Health</div><div id="healthTag" class="v">—</div></div>
          <div class="mini"><div class="k">Status</div><div id="statusTag" class="v">—</div></div>
          <div class="mini"><div class="k">Risk</div><div id="riskTag" class="v">—</div></div>
        </div>

        <div class="box">
          <h3>Trajectory</h3>
          <div id="trajectoryOutput" class="trajectory-list"></div>
        </div>

        <div class="box">
          <h3>Recommendation</h3>
          <pre id="decisionOutput">Awaiting run...</pre>
        </div>

        <div class="box">
          <h3>Raw Data</h3>
          <pre id="jsonOutput">{}</pre>
        </div>
      </section>
    </div>
  </div>

  <script>
    function applyPreset() {
      const p = document.getElementById('preset').value;
      const vals = {
        healthy: {t:26, o:4.0, n:1, s:1, l:9},
        critical: {t:32, o:2.2, n:8, s:7, l:3},
        custom: {t:28, o:3.5, n:3, s:2, l:8}
      }[p];
      if(!vals) return;
      document.getElementById('temp').value = vals.t;
      document.getElementById('omega').value = vals.o;
      document.getElementById('nutrients').value = vals.n;
      document.getElementById('sediment').value = vals.s;
      document.getElementById('light').value = vals.l;
    }

async function fetchNOAA(btn) {

  const original = btn.innerText;
  btn.innerText = "Loading...";

  try {

    const url = "https://marine-api.open-meteo.com/v1/marine?latitude=9.35&longitude=-82.25&hourly=sea_surface_temperature";

    const res = await fetch(url);

    if (!res.ok) throw new Error("API failed");

    const data = await res.json();

    if (!data?.hourly?.sea_surface_temperature?.length) {
      throw new Error("Bad data");
    }

    const temps = data.hourly.sea_surface_temperature;
    const latest = temps[temps.length - 1];

    document.getElementById('temp').value = latest.toFixed(2);

    runEngine("Live SST");

  } catch (e) {
    console.error(e);
    alert("Live data failed — fallback used");
    runEngine("Manual Fallback");
  }

  btn.innerText = original;
}

    function resetForm() {
      document.getElementById('preset').value = 'custom';
      applyPreset();
      document.getElementById('healthTag').innerText = '—';
      document.getElementById('statusTag').innerText = '—';
      document.getElementById('riskTag').innerText = '—';
      document.getElementById('trajectoryOutput').innerHTML = '';
      document.getElementById('decisionOutput').innerText = 'Awaiting run...';
      document.getElementById('jsonOutput').innerText = '{}';
    }

    function runEngine(source) {
      const T = parseFloat(document.getElementById('temp').value);
      const O = parseFloat(document.getElementById('omega').value);
      const N = parseFloat(document.getElementById('nutrients').value);
      const S = parseFloat(document.getElementById('sediment').value);
      const L = parseFloat(document.getElementById('light').value);
      const months = Math.min(60, parseInt(document.getElementById('time').value) || 12);

      let health = 100;
      let trajectory = [];
      
      const tStress = T > 30 ? (T - 30) * 5 : (30 - T) * 0.5;
      const recovery = (O / 4) + (L / 10);
      const degradation = (N + S + tStress) / 5;

      const trajContainer = document.getElementById('trajectoryOutput');
      trajContainer.innerHTML = '';

      for (let i = 1; i <= months; i++) {
        health += (recovery - degradation);
        health = Math.min(100, Math.max(0, health));
        const val = health.toFixed(1);
        trajectory.push(val);

        const chip = document.createElement('div');
        chip.className = 'month-chip';
        chip.innerHTML = `<b>Month ${i}</b> ${val}%`;
        trajContainer.appendChild(chip);
      }

      const status = health > 70 ? 'Healthy' : health > 40 ? 'Warning' : 'Critical';
      const risk = (recovery - degradation) < 0 ? 'High' : 'Stable';

      document.getElementById('sourceTag').innerText = source;
      document.getElementById('healthTag').innerText = health.toFixed(1) + '%';
      document.getElementById('statusTag').innerText = status;
      document.getElementById('riskTag').innerText = risk;
      document.getElementById('decisionOutput').innerText = status === 'Critical' ? 'Immediate intervention required.' : 'Continue regular monitoring.';
      
      const result = { source, finalHealth: health.toFixed(1), status, risk, trajectory };
      document.getElementById('jsonOutput').innerText = JSON.stringify(result, null, 2);
    }
  </script>
</body>
</html>
