<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN™ Optimization Pro</title>

<style>
body { font-family: Arial; padding: 20px; }

input {
  margin: 5px;
  padding: 6px;
  width: 120px;
}

button {
  margin: 8px 4px;
  padding: 8px 12px;
  cursor: pointer;
}

#sourceTag {
  margin-top: 10px;
  font-weight: bold;
}

pre {
  background: #f4f4f4;
  padding: 10px;
}
</style>

</head>

<body>

<h2>GROAN™ Optimization Pro</h2>

<label>Temperature (°C)</label><br>
<input id="temp" type="number" value="28"><br>

<label>Ωarag</label><br>
<input id="omega" type="number" value="3.5"><br>

<label>Nutrients</label><br>
<input id="nutrients" type="number" value="3"><br>

<label>Sediment</label><br>
<input id="sediment" type="number" value="2"><br>

<label>Light</label><br>
<input id="light" type="number" value="8"><br>

<label>Time (months)</label><br>
<input id="time" type="number" value="12"><br>

<br>

<button onclick="runManual()">Run GROAN (Manual)</button>
<button onclick="runWithNOAA()">Run GROAN (NOAA)</button>

<div id="sourceTag">Data Source: Manual</div>

<h3>Output</h3>
<pre id="output"></pre>

<script>

// ---------------- NOAA FETCH ----------------

const NOAA_BASE_URL = "https://coastwatch.pfeg.noaa.gov/erddap/griddap/";
const DATASET = "jplMURSST41";

async function fetchNOAA(lat, lon) {
    try {
        const today = new Date().toISOString().split("T")[0];

        const url = `${NOAA_BASE_URL}${DATASET}.json?analysed_sst[(${today}T00:00:00Z)][(${lat})][(${lon})]`;

        const res = await fetch(url);
        if (!res.ok) throw new Error("NOAA fetch failed");

        const data = await res.json();

        const tempK = data.table.rows[0][0];
        const tempC = tempK - 273.15;

        return round(tempC, 2);

    } catch (e) {
        console.error("NOAA ERROR:", e);
        return null;
    }
}

// ---------------- RUN MODES ----------------

function runManual() {
    runEngine("MANUAL");
}

async function runWithNOAA() {

    const lat = 9.35;
    const lon = -82.25;

    const temp = await fetchNOAA(lat, lon);

    if (temp !== null) {
        document.getElementById("temp").value = temp;
        runEngine("NOAA LIVE");
    } else {
        alert("NOAA failed. Using manual values.");
        runEngine("MANUAL");
    }
}

// ---------------- ENGINE ----------------

function runEngine(sourceLabel) {

    const temp = parseFloat(document.getElementById("temp").value);
    const omega = parseFloat(document.getElementById("omega").value);
    const nutrients = parseFloat(document.getElementById("nutrients").value);
    const sediment = parseFloat(document.getElementById("sediment").value);
    const light = parseFloat(document.getElementById("light").value);
    const time = parseInt(document.getElementById("time").value);

    const T = convertTemperatureToStress(temp);

    let health = 100;
    let trajectory = [];

    for (let i = 0; i < time; i++) {

        let stress = (T + nutrients + sediment) / 3;
        let recovery = (omega + light) / 2;

        health += (recovery - stress);
        health = clamp(health, 0, 100);

        trajectory.push(round(health, 2));
    }

    const trend = detectTrend(trajectory);
    const momentum = detectMomentum(trajectory);
    const status = classifyStatus(health, trend);

    document.getElementById("sourceTag").innerText = "Data Source: " + sourceLabel;

    document.getElementById("output").innerText =
        JSON.stringify({
            final_health: health,
            status,
            trend,
            momentum,
            trajectory,
            data_source: sourceLabel
        }, null, 2);
}

// ---------------- HELPERS ----------------

function convertTemperatureToStress(temp) {
    if (temp < 26) return 2;
    if (temp < 28) return 4;
    if (temp < 30) return 6;
    if (temp < 31) return 8;
    return 10;
}

function detectTrend(arr) {
    if (arr[arr.length - 1] > arr[0]) return "Improving";
    if (arr[arr.length - 1] < arr[0]) return "Degrading";
    return "Stable";
}

function detectMomentum(arr) {
    let delta = arr[arr.length - 1] - arr[arr.length - 2];
    if (Math.abs(delta) < 0.5) return "Weak";
    if (Math.abs(delta) < 1.5) return "Moderate";
    return "Strong";
}

function classifyStatus(health, trend) {
    if (health > 70 && trend === "Improving") return "Stable";
    if (health > 50) return "Watch";
    if (health > 30) return "Warning";
    return "Critical";
}

function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

function round(val, dec) {
    return Number(Math.round(val + "e" + dec) + "e-" + dec);
}

</script>

</body>
</html>
