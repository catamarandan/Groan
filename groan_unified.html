<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GROAN UNIFIED FULL</title>
<style>
body { font-family: Arial; background:#0b1e2d; color:#fff; padding:20px; }
button { padding:10px; margin:5px; }
#o { background:#111; padding:15px; white-space:pre-wrap; }
</style>
</head>

<body>

<h2>GROAN UNIFIED FULL</h2>

<button onclick="run()">RUN</button>

<pre id="o">READY</pre>

<script>

// FULL STRUCTURE — NO BREAK PATH

const DTI_REGISTRY = {
  WATER_TEMP_C: { min:-2, max:40 },
  OUTCOME_SIGNAL: { enum:["stable","stress","critical"] }
};

function ingest(dtis){
  return dtis.map(d => {

    if(d.dti === "WATER_TEMP_C"){
      if(typeof d.value !== "number") return {status:"REJECTED"};
      if(d.value < -2 || d.value > 40) return {status:"REJECTED"};
    }

    if(d.dti === "OUTCOME_SIGNAL"){
      if(!DTI_REGISTRY.OUTCOME_SIGNAL.enum.includes(d.value)){
        return {status:"REJECTED"};
      }
    }

    return {status:"ACCEPTED", record:d};
  });
}

function convert(temp){

  let outcome = "stable";
  if(temp > 30) outcome = "stress";
  if(temp > 32) outcome = "critical";

  return [
    { dti:"WATER_TEMP_C", value:temp },
    { dti:"OUTCOME_SIGNAL", value:outcome }
  ];
}

function engine(validated){

  let status = "OK";

  validated.forEach(v=>{
    if(v.record?.dti === "OUTCOME_SIGNAL"){
      if(v.record.value === "critical") status = "CRITICAL";
      else if(v.record.value === "stress" && status !== "CRITICAL"){
        status = "STRESS";
      }
    }
  });

  return status;
}

function run(){

  const temp = 29.9; // controlled input

  const dtis = convert(temp);
  const validated = ingest(dtis);
  const status = engine(validated);

  document.getElementById("o").textContent =
`DTI: ${dtis.map(d=>d.dti).join(", ")}

TEMP: ${temp}

ENGINE: ${status}

----------------

${JSON.stringify({dtis, validated}, null, 2)}
`;
}

</script>

</body>
</html>
