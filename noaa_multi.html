<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GROAN NOAA Multi-DTI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui; padding:20px; background:#f4f7fb; }
  .box { background:#fff; padding:16px; border-radius:10px; margin-bottom:12px; border:1px solid #d7deea; }
  button { padding:10px 14px; font-weight:700; cursor:pointer; }
  pre { background:#eef3f8; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<h2>GROAN NOAA Multi-DTI Test</h2>

<div class="box">
  <button id="runBtn">Run Multi-DTI Ingestion</button>
</div>

<div class="box">
  <pre id="out">Waiting...</pre>
</div>

<script type="module">

import { loadDTI, ingest } from './js/groan_ingest_v1.js';

await loadDTI();

async function fetchNOAA() {
  const url = "https://marine-api.open-meteo.com/v1/marine?latitude=9.35&longitude=-82.25&hourly=sea_surface_temperature";
  const res = await fetch(url);
  const data = await res.json();

  const temps = data.hourly.sea_surface_temperature;
  const latest = temps.filter(v => v !== null).slice(-1)[0];

  return latest;
}

function deriveDTIs(tempC) {
  return [
    {
      site_id: "Bocas_Test",
      time: new Date().toISOString(),
      dti: "WATER_TEMP_C",
      value: tempC
    },
    {
      site_id: "Bocas_Test",
      time: new Date().toISOString(),
      dti: "OUTCOME_SIGNAL",
      value: tempC > 30 ? "declined" : tempC > 28 ? "stable" : "improved"
    }
  ];
}

document.getElementById("runBtn").addEventListener("click", async () => {

  const out = document.getElementById("out");

  try {
    const temp = await fetchNOAA();
    const records = deriveDTIs(temp);
    const results = records.map(r => ingest(r));

    out.innerText = JSON.stringify({
      tempC: temp,
      results
    }, null, 2);

  } catch (e) {
    out.innerText = "ERROR: " + e;
  }

});

</script>

</body>
</html>
